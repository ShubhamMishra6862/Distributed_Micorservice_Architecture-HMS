  version: "3.9"

  services:

    # =========================================================
    # API GATEWAY
    # =========================================================
    api-gateway:
      container_name: api-gateway
      build:
        context: ../api-gateway
        dockerfile: Dockerfile
      ports:
        - "4004:4004"
      depends_on:
        - auth-service
        - patient-service
        - appointment-service
        - billing-service
      environment:
        SPRING_PROFILES_ACTIVE: docker
        AUTH_SERVICE_URL: #
      networks:
        - healthcare-network

    # =========================================================
    # AUTH SERVICE
    # =========================================================
    auth-service:
      container_name: auth-service
      build:
        context: ../auth-service
        dockerfile: Dockerfile
      ports:
        - "4005:4005"
      depends_on:
        - auth-db
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
        SPRING_DATASOURCE_USERNAME: #
        SPRING_DATASOURCE_PASSWORD: #
        JWT_SECRET: #
        SPRING_PROFILES_ACTIVE: docker
      networks:
        - healthcare-network

    auth-db:
      image: postgres:15
      container_name: auth-db
      restart: always
      environment:
        POSTGRES_DB: auth_db
        POSTGRES_USER: #
        POSTGRES_PASSWORD: #
      ports:
        - "5433:5432"
      volumes:
        - auth_db_data:/var/lib/postgresql/data
      networks:
        - healthcare-network

    # =========================================================
    # PATIENT SERVICE
    # =========================================================
    patient-service:
      container_name: patient-service
      build:
        context: ../patient-service
        dockerfile: Dockerfile
      ports:
        - "4000:4000"
        - "9000:9000"
      depends_on:
        patient-db:
          condition: service_started
        kafka:
          condition: service_started
        elasticsearch:
          condition: service_healthy
        kibana:
          condition: service_started
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patient_db
        SPRING_DATASOURCE_USERNAME: #
        SPRING_DATASOURCE_PASSWORD: #

        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

        SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

        SPRING_PROFILES_ACTIVE: docker

        GRPC_SERVER_PORT: 9000
      networks:
        - healthcare-network

    patient-db:
      image: postgres:15
      container_name: patient-db
      restart: always
      environment:
        POSTGRES_DB: patient_db
        POSTGRES_USER: #
        POSTGRES_PASSWORD: #
      ports:
        - "5434:5432"
      volumes:
        - patient_db_data:/var/lib/postgresql/data
      networks:
        - healthcare-network

    # =========================================================
    # APPOINTMENT SERVICE
    # =========================================================
    appointment-service:
      container_name: appointment-service
      build:
        context: ../appointment-service
        dockerfile: Dockerfile
      ports:
        - "4002:4002"
        - "9002:9002"
      depends_on:
        - appointment-db
        - kafka
        - patient-service
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-db:5432/appointment_db
        SPRING_DATASOURCE_USERNAME: #
        SPRING_DATASOURCE_PASSWORD: #

        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

        SPRING_PROFILES_ACTIVE: docker

        GRPC_SERVER_PORT: 9002
      networks:
        - healthcare-network

    appointment-db:
      image: postgres:15
      container_name: appointment-db
      restart: always
      environment:
        POSTGRES_DB: appointment_db
        POSTGRES_USER: #
        POSTGRES_PASSWORD: #
      ports:
        - "5437:5432"
      volumes:
        - appointment_db_data:/var/lib/postgresql/data
      networks:
        - healthcare-network

    # =========================================================
    # BILLING SERVICE
    # =========================================================
    billing-service:
      container_name: billing-service
      build:
        context: ../billing-service
        dockerfile: Dockerfile
      ports:
        - "4003:4003"
        - "9003:9003"
      depends_on:
        - billing-db
        - kafka
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/billing_db
        SPRING_DATASOURCE_USERNAME: #
        SPRING_DATASOURCE_PASSWORD: #

        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_KAFKA_CONSUMER_GROUP_ID: billing-group
        SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest

        SPRING_PROFILES_ACTIVE: docker

        GRPC_SERVER_PORT: 9003
      networks:
        - healthcare-network

    billing-db:
      image: postgres:15
      container_name: billing-db
      restart: always
      environment:
        POSTGRES_DB: billing_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5436:5432"
      volumes:
        - billing_db_data:/var/lib/postgresql/data
      networks:
        - healthcare-network

    # =========================================================
    # ANALYTICS SERVICE
    # =========================================================
    analytics-service:
      container_name: analytics-service
      build:
        context: ../analytics-service
        dockerfile: Dockerfile
      ports:
        - "4006:4006"
      depends_on:
        - kafka
      environment:
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_PROFILES_ACTIVE: docker
      networks:
        - healthcare-network

    # =========================================================
    # ZOOKEEPER
    # =========================================================
    zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      container_name: zookeeper
      restart: always
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
      ports:
        - "2181:2181"
      networks:
        - healthcare-network

    # =========================================================
    # KAFKA
    # =========================================================
    kafka:
      image: confluentinc/cp-kafka:7.5.0
      container_name: kafka
      restart: always
      depends_on:
        - zookeeper
      ports:
        - "9092:9092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      networks:
        - healthcare-network

    # =========================================================
    # ELASTICSEARCH
    # =========================================================
    elasticsearch:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
      container_name: elasticsearch
      restart: always
      environment:
        - discovery.type=single-node
        - xpack.security.enabled=false
        - ES_JAVA_OPTS=-Xms512m -Xmx512m
      healthcheck:
        test: [ "CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1" ]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 30s
      ports:
        - "9200:9200"
      volumes:
        - elasticsearch_data:/usr/share/elasticsearch/data
      networks:
        - healthcare-network

    # =========================================================
    # KIBANA
    # =========================================================
    kibana:
      image: docker.elastic.co/kibana/kibana:8.13.4
      container_name: kibana
      restart: always
      depends_on:
        - elasticsearch
      environment:
        ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ports:
        - "5601:5601"
      networks:
        - healthcare-network

  # =========================================================
  # VOLUMES
  # =========================================================
  volumes:
    auth_db_data:
    patient_db_data:
    billing_db_data:
    appointment_db_data:
    elasticsearch_data:

  # =========================================================
  # NETWORKS
  # =========================================================
  networks:
    healthcare-network:
      driver: bridge
